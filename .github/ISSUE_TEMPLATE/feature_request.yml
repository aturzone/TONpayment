name: Feature request
description: Suggest an enhancement for TONpayment
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Reminder: TONpayment is intentionally **non-custodial / watch-only**. Proposals that
        add key handling, signing, or fund movement are out of scope.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? API shape, config, behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
